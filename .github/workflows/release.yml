name: Release & Publish

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions: {}

jobs:
  ensure-doc:
    name: Ensure documentation builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          toolchain: nightly
          cache: false

      - name: Install cargo-doc-rs
        uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419 # v2.82.7
        with:
          tool: cargo-docs-rs

      - run: cargo docs-rs

  release:
    runs-on: ubuntu-latest
    needs: ensure-doc
    name: Release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
            cache: false

      - name: Publish to crates.io
        # zizmor: ignore[use-trusted-publishing]
        run: cargo publish --workspace --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
